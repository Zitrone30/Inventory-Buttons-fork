pluginManagement {
	repositories {
		maven {
			name = 'Fabric'
			url = 'https://maven.fabricmc.net/'
		}
		mavenCentral()
		gradlePluginPortal()
	}
}

import org.gradle.util.GradleVersion

def minimumGradleVersion = GradleVersion.version("9.2")
if (GradleVersion.current() < minimumGradleVersion) {
	throw new GradleException(
		"This project requires Gradle ${minimumGradleVersion.version} or newer. " +
		"Use the included wrapper with ./gradlew build."
	)
}
